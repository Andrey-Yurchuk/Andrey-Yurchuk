<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR</title>
</head>
<style>
.container .element {
    display: inline-block;
    background: url('star0.png') no-repeat;
    width: 80px;
    height: 80px;
}
.element:hover ~ .element:nth-of-type(1),
.element:hover ~ .element:nth-of-type(-n+2),
.element:hover ~ .element:nth-of-type(-n+3),
.element:hover ~ .element:nth-of-type(-n+4),
.element:hover ~ .element:nth-of-type(-n+5) {
    background: url('star1.png') no-repeat;
    width: 80px;
    height: 80px;
}
</style>
<body>
    <div class="container">
        <div class="element"></div>
        <div class="element"></div>
        <div class="element"></div>
        <div class="element"></div>
        <div class="element"></div>
    </div>
</body>
</html>
